spring:
  application:
    name: farragh-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/farragh}
    username: ${DB_USERNAME:farragh}
    password: ${DB_PASSWORD:changeme}

  jpa:
    hibernate:
      ddl-auto: validate   # schema owned by Flyway migrations, never by Hibernate auto-DDL
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:changeme-use-a-long-random-string-in-real-envs}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cmi:
    mode: ${CMI_MODE:mock}
    merchant-id: ${CMI_MERCHANT_ID:}
    store-key: ${CMI_STORE_KEY:}
    api-url: ${CMI_API_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false   # re-enable in Sprint 4 once real SMTP notifications are wired up (Story 4.2)
