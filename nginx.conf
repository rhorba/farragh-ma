events {}

http {
  server {
    listen 80;

    location /api/ {
      proxy_pass http://backend:8080/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /actuator/health {
      proxy_pass http://backend:8080/actuator/health;
    }

    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
    }
  }
}
