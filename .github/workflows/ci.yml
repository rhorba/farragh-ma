name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '25' }
      - name: Build & test (Testcontainers spin up their own Postgres+PostGIS)
        working-directory: backend
        run: mvn -B verify
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx ng lint
      - working-directory: frontend
        run: npx ng test --no-watch --coverage

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with: { config: p/owasp-top-ten }
      - uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, severity: 'CRITICAL,HIGH', exit-code: '1' }
      - uses: gitleaks/gitleaks-action@v2

  build:
    needs: [backend, frontend, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t farragh-backend:${{ github.sha }} ./backend
      - name: Build frontend image
        run: docker build -t farragh-frontend:${{ github.sha }} ./frontend

  # Release coverage gate (CLAUDE.md rule 6): only enforced at release time (Sprint 7 hardening
  # onward), not on every routine push — see backend/pom.xml "coverage-gate" profile.
  release-coverage-gate:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '25' }
      - working-directory: backend
        run: mvn -B verify -Pcoverage-gate
