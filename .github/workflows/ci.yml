name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '25' }
      - name: Build & test (Testcontainers spin up their own Postgres+PostGIS)
        working-directory: backend
        run: mvn -B verify
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx ng lint
      - working-directory: frontend
        run: npx ng test --no-watch --coverage

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with: { config: p/owasp-top-ten }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '25' }
      # Warm the local Maven cache so Trivy's fs scan resolves pom.xml dependency
      # versions from disk instead of re-hitting Maven Central (avoids 429 rate limits).
      - working-directory: backend
        run: mvn -B dependency:go-offline
      - uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, severity: 'CRITICAL,HIGH', exit-code: '1' }
      - uses: gitleaks/gitleaks-action@v2

  build:
    needs: [backend, frontend, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t farragh-backend:${{ github.sha }} ./backend
      - name: Build frontend image
        run: docker build -t farragh-frontend:${{ github.sha }} ./frontend

  # Story 7.3: E2E golden path (post request -> recycler accepts -> status progression ->
  # mock payment) in FR and AR, against the real docker-compose stack (db+backend+frontend+
  # reverse-proxy), same stack used for manual verification every sprint.
  e2e:
    needs: [backend, frontend, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Synthesize CI env (no real secrets needed - CMI_MODE=mock, DB/JWT are ephemeral)
        run: cp .env.example .env
      - name: Bring up the stack
        run: docker compose up --wait
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - working-directory: e2e
        run: npm ci
      - working-directory: e2e
        run: npx playwright install --with-deps chromium
      - working-directory: e2e
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
      - name: Tear down the stack
        if: always()
        run: docker compose down

  # Release coverage gate (CLAUDE.md rule 6): only enforced at release time (Sprint 7 hardening
  # onward), not on every routine push — see backend/pom.xml "coverage-gate" profile.
  release-coverage-gate:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '25' }
      - working-directory: backend
        run: mvn -B verify -Pcoverage-gate
